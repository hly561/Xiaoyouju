<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学校选择器数据预览</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <h1>学校选择器数据预览</h1>
      <p>用于快速验证内地 / 港澳台 / 海外院校数据加载与层级展示。</p>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="mainland">内地</button>
      <button class="tab" data-tab="hmt">港澳台</button>
      <button class="tab" data-tab="foreign">海外</button>
    </nav>

    <section id="searchBar">
      <input id="searchInput" type="text" placeholder="搜索学校名称" />
      <button id="clearSearch">清空</button>
      <span id="searchInfo"></span>
    </section>

    <main>
      <div class="panel" id="panel-mainland">
        <div class="columns">
          <div class="column">
            <h3>省份</h3>
            <ul id="mainland-provinces"></ul>
          </div>
          <div class="column">
            <h3>学校</h3>
            <ul id="mainland-schools"></ul>
          </div>
        </div>
      </div>

      <div class="panel hidden" id="panel-hmt">
        <div class="columns">
          <div class="column">
            <h3>区域</h3>
            <ul id="hmt-regions"></ul>
          </div>
          <div class="column">
            <h3>学校</h3>
            <ul id="hmt-schools"></ul>
          </div>
        </div>
      </div>

      <div class="panel hidden" id="panel-foreign">
        <div class="columns">
          <div class="column">
            <h3>国家/地区</h3>
            <ul id="foreign-countries"></ul>
          </div>
          <div class="column">
            <h3>学校</h3>
            <ul id="foreign-schools"></ul>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <small>数据来源于 pages/school-selector/data 目录下生成的 JSON 文件。</small>
    </footer>

    <script src="./main.js"></script>
  </body>
  </html>
